version: '3.8'

# Production Configuration for Ayantaraz
# Server: 202.133.91.13
# IP-based deployment (domain can be added later)
# Usage: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ayantaraz-api
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      - NODE_ENV=production
      - PORT=3001
      - API_URL=http://202.133.91.13:3001
      - FRONTEND_URL=http://202.133.91.13:3000
      - SITE_URL=http://202.133.91.13
      - INTERNAL_API_URL=http://api:3001/api
      - NEXT_PUBLIC_API_URL=http://202.133.91.13:3001
      - NEXT_PUBLIC_SITE_URL=http://202.133.91.13
      - DATABASE_URL=postgresql://ayantaraz:AyantarazDB@2025@postgres:5432/ayantaraz?schema=public&connection_limit=20&pool_timeout=10&statement_timeout=30000&idle_timeout=60
      - POSTGRES_USER=ayantaraz
      - POSTGRES_PASSWORD=AyantarazDB@2025
      - POSTGRES_DB=ayantaraz
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=AyantarazRedis@2025
      - REDIS_URL=redis://:AyantarazRedis@2025@redis:6379
      - JWT_SECRET=AyantarazJWTSecretKey2025Production1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ
      - JWT_REFRESH_SECRET=AyantarazJWTRefreshSecretKey2025Production0987654321ZYXWVUTSRQPONMLKJIHGFEDCBA
      - JWT_EXPIRATION=15m
      - JWT_REFRESH_EXPIRATION=7d
      - FILE_ENCRYPTION_KEY=AyantarazFileEncryptionKey2025ProductionABCDEFGHIJKLMNOPQRSTUVWXYZ123456
      - SESSION_SECRET=AyantarazSessionSecretKey2025ProductionABCDEFGHIJKLMNOPQRSTUVWXYZ
      - SMS_API_KEY=${SMS_API_KEY:-CHANGE_ME}
      - SMS_PROVIDER=sms-panel
      - SMS_FROM=Ayantaraz
      - ADMIN_PHONE=09133374162,09134292329
      - ALLOW_ALL_ORIGINS=true
      - TRUSTED_ORIGINS=http://202.133.91.13,http://202.133.91.13:3000,http://202.133.91.13:3001
      - COOKIE_SECURE=false
      - COOKIE_HTTP_ONLY=true
      - COOKIE_SAME_SITE=lax
      - COOKIE_DOMAIN=202.133.91.13
      - LOG_LEVEL=info
      - TZ=Asia/Tehran
      - MAX_FILE_SIZE=10485760
      - UPLOAD_DIR=/app/uploads
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
      - RATE_LIMITER_FAIL_OPEN=true
      - OTP_EXPIRY_SECONDS=300
      - OTP_MAX_ATTEMPTS=5
      - OTP_RESEND_LIMIT=3
      - OTP_RESEND_WINDOW_MINUTES=10
      - OTP_BLOCK_DURATION_MINUTES=30
      - DB_POOL_MAX_CONNECTIONS=20
      - DB_POOL_MIN_CONNECTIONS=5
      - DB_POOL_MAX_REQUESTS_PER_CONNECTION=100
      - DB_POOL_IDLE_TIMEOUT_MS=30000
      - DB_POOL_CONNECTION_TIMEOUT_MS=5000
      - HEALTH_CHECK_INTERVAL=30000
    ports:
      - "3001:3001"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - ayantaraz-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_SITE_URL=http://202.133.91.13
        - NEXT_PUBLIC_API_URL=http://202.133.91.13:3001
        - INTERNAL_API_URL=http://api:3001/api
    container_name: ayantaraz-web
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_SITE_URL=http://202.133.91.13
      - NEXT_PUBLIC_API_URL=http://202.133.91.13:3001
      - INTERNAL_API_URL=http://api:3001/api
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ayantaraz-network

  postgres:
    image: postgres:15-alpine
    container_name: ayantaraz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ayantaraz
      POSTGRES_PASSWORD: AyantarazDB@2025
      POSTGRES_DB: ayantaraz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ayantaraz"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ayantaraz-network

  redis:
    image: redis:7-alpine
    container_name: ayantaraz-redis
    restart: unless-stopped
    command: sh -c "redis-server --requirepass AyantarazRedis@2025"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a AyantarazRedis@2025 ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ayantaraz-network

  nginx:
    image: nginx:alpine
    container_name: ayantaraz-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ayantaraz-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ayantaraz-network:
    driver: bridge
