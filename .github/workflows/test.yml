name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  PNPM_VERSION: 11.9.0

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --shamefully-hoist

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test?schema=public
        run: npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_key_1234567890
          JWT_REFRESH_SECRET: test_jwt_refresh_secret_0987654321
          FILE_ENCRYPTION_KEY: test_file_encryption_key
          SESSION_SECRET: test_session_secret
          NODE_ENV: test
          SMS_API_KEY: test_sms_key
          CAPTCHA_SECRET: test_captcha
          ADMIN_PHONE: 09120000000
        run: pnpm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            coverage/
          retention-days: 7
