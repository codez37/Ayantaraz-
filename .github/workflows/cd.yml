name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      - name: Build and Push Docker Images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            codez37/ayantaraz-web:latest
            codez37/ayantaraz-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and Push API Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            codez37/ayantaraz-api:latest
            codez37/ayantaraz-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /opt/ayantaraz
            git pull origin main
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --build
            
            MAX_RETRIES=30
            RETRY_DELAY=10
            retries=0
            while [ $retries -lt $MAX_RETRIES ]; do
              if curl -s --head --fail http://localhost:3001/health > /dev/null 2>&1; then
                echo "✓ سرویس API سالم است"
                exit 0
              fi
              retries=$((retries + 1))
              echo "در انتظار سالم شدن سرویس... ($retries/$MAX_RETRIES)"
              sleep $RETRY_DELAY
            done
            echo "❌ سرویس API سالم نشد"
            exit 1