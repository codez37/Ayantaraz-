name: CD - Production Deployment Pipeline

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  deploy:
    name: Production Deployment
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint
        run: pnpm lint
      - name: Run typecheck
        run: pnpm typecheck
      - name: Run tests
        run: pnpm test
      - name: Generate Prisma client
        run: pnpm db:generate
      - name: Build application
        run: pnpm build
      - name: Deploy with Docker
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml down && docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
      - name: Verify deployment
        run: sleep 30 && curl -s http://localhost:3001/health