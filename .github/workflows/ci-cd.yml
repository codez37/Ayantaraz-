name: Ayantaraz CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  PNPM_VERSION: 11.9.0
  DOCKER_COMPOSE_VERSION: v2.24.5

jobs:
  # =============================================================================
  # Job 1: Setup and Validate
  # =============================================================================
  setup:
    name: Setup and Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile --shamefully-hoist

      - name: Validate Prisma schema
        run: |
          npx prisma validate --schema=prisma/schema.prisma

      - name: Generate Prisma client
        run: |
          npx prisma generate --schema=prisma/schema.prisma

      - name: Validate TypeScript compilation
        run: |
          pnpm typecheck

      - name: Run lint
        run: |
          pnpm lint

      - name: Run format check
        run: |
          pnpm format:check

      - name: Validate build
        run: |
          pnpm build:validate

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/api/dist
            apps/web/.next
            node_modules
            packages
            prisma
          retention-days: 1

  # =============================================================================
  # Job 2: Run Tests
  # =============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: setup
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile --shamefully-hoist

      - name: Generate Prisma client
        run: |
          npx prisma generate --schema=prisma/schema.prisma

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test?schema=public
        run: |
          npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_secret_key_1234567890
          JWT_REFRESH_SECRET: test_refresh_secret_0987654321
          FILE_ENCRYPTION_KEY: test_encryption_key
          SESSION_SECRET: test_session_secret
          NODE_ENV: test
        run: |
          pnpm test

  # =============================================================================
  # Job 3: Build Docker Images
  # =============================================================================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, test]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/api
            ghcr.io/${{ github.repository }}/web
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository }}/api:latest,ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository }}/web:latest,ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================================================
  # Job 4: Deploy to Production
  # =============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Deploy via SSH
        env:
          SSH_USER: ${{ secrets.SSH_USER || 'root' }}
          SERVER_IP: 202.133.91.13
        run: |
          ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SERVER_IP} "
            cd /opt/Ayantaraz- || exit 1
            git fetch origin main
            git checkout main
            git pull origin main
            
            # Make sure scripts are executable
            chmod +x deploy-production.sh validate-production.sh
            
            # Stop existing containers
            docker compose -f docker-compose.yml -f docker-compose.production.yml down || true
            
            # Pull latest images
            docker compose -f docker-compose.yml -f docker-compose.production.yml pull
            
            # Start containers
            docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --build
            
            # Wait for services
            sleep 30
            
            # Run migrations
            docker compose -f docker-compose.yml -f docker-compose.production.yml exec api npx prisma migrate deploy --schema=/app/prisma/schema.prisma
            
            # Seed database
            docker compose -f docker-compose.yml -f docker-compose.production.yml exec api node /app/prisma/seed.js
          "

      - name: Verify deployment
        env:
          SSH_USER: ${{ secrets.SSH_USER || 'root' }}
          SERVER_IP: 202.133.91.13
        run: |
          # Wait a bit for everything to start
          sleep 10
          
          # Check health endpoint
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${SERVER_IP}:3001/health)
          if [ "$HEALTH_STATUS" != "200" ]; then
            echo "Health check failed with status: $HEALTH_STATUS"
            exit 1
          fi
          
          # Check web endpoint
          WEB_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${SERVER_IP}:3000)
          if [ "$WEB_STATUS" != "200" ]; then
            echo "Web check failed with status: $WEB_STATUS"
            exit 1
          fi
          
          echo "Deployment verified successfully!"

  # =============================================================================
  # Job 5: Security Scan
  # =============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # =============================================================================
  # Job 6: Performance Check
  # =============================================================================
  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deploy-production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 60

      - name: Check API response time
        run: |
          SERVER_IP=202.133.91.13
          
          # Test health endpoint response time
          START=$(date +%s%N)
          curl -s http://${SERVER_IP}:3001/health > /dev/null
          END=$(date +%s%N)
          DURATION=$((($END - $START) / 1000000))
          
          echo "Health endpoint response time: ${DURATION}ms"
          
          if [ $DURATION -gt 1000 ]; then
            echo "Warning: Response time exceeds 1 second"
          fi

  # =============================================================================
  # Job 7: Notification
  # =============================================================================
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy-production, security-scan, performance-check]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Check deployment status
        run: |
          echo "Deployment Status Report"
          echo "======================="
          echo ""
          
          if [ ${{ needs.deploy-production.result }} == 'success' ]; then
            echo "✅ Deployment: SUCCESS"
          else
            echo "❌ Deployment: FAILED"
          fi
          
          if [ ${{ needs.security-scan.result }} == 'success' ]; then
            echo "✅ Security Scan: PASSED"
          else
            echo "❌ Security Scan: FAILED"
          fi
          
          if [ ${{ needs.performance-check.result }} == 'success' ]; then
            echo "✅ Performance Check: PASSED"
          else
            echo "❌ Performance Check: FAILED"
          fi
          
          echo ""
          echo "Access your deployment at: http://202.133.91.13"
