name: Docker Build and Push

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository }}/api
  IMAGE_NAME_WEB: ${{ github.repository }}/web

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # این بخش به صورت موقت نام ریپازیتوری شما را برای داکر کوچک می‌کند
      - name: Lowercase Repository Name for Docker
        id: repo-name
        run: |
          echo "LOW_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          # اینجا از نسخه تبدیل‌شده استفاده می‌شود تا داکر ایراد نگیرد
          images: ${{ env.REGISTRY }}/${{ env.LOW_REPO }}/api
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata (tags, labels) for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          # اینجا از نسخه تبدیل‌شده استفاده می‌شود تا داکر ایراد نگیرد
          images: ${{ env.REGISTRY }}/${{ env.LOW_REPO }}/web
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        id: build-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Build and push Web image
        id: build-web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate artifact attestation for API
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.LOW_REPO }}/api
          subject-digest: ${{ steps.build-api.outputs.digest }}
          push-to-registry: true

      - name: Generate artifact attestation for Web
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.LOW_REPO }}/web
          subject-digest: ${{ steps.build-web.outputs.digest }}
          push-to-registry: true

      - name: Output image information
        run: |
          echo "API Image Tags: ${{ steps.meta-api.outputs.tags }}"
          echo "Web Image Tags: ${{ steps.meta-web.outputs.tags }}"
          echo ""
          echo "To pull the images:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.LOW_REPO }}/api:latest"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.LOW_REPO }}/web:latest"
          
