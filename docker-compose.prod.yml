version: '3.8'

# Production overrides
# Use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    environment:
      - NODE_ENV=production
      - API_URL=http://localhost:3001
      - FRONTEND_URL=http://localhost:3000
      - SITE_URL=http://localhost
      - COOKIE_DOMAIN=localhost
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  db:
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  redis:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
