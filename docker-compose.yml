version: '3.8'

services:
  # =========================================================
  # EDGE GATEWAY (ONLY PUBLIC ENTRY POINT)
  # =========================================================
  nginx:
    image: nginx:alpine
    container_name: ayantaraz-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - internal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:size=32m
      - /var/cache/nginx:size=64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # =========================================================
  # WEB (NEXT.JS SSR - INTERNAL ONLY)
  # =========================================================
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    container_name: ayantaraz-web
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_SITE_URL: http://202.133.91.13
      API_BASE_URL: /api
    depends_on:
      - api
    networks:
      - internal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # =========================================================
  # API (BFF / BACKEND - INTERNAL ONLY)
  # =========================================================
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: ayantaraz-api
    expose:
      - "3001"
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      TRUSTED_ORIGINS: http://202.133.13
      API_BASE_PATH: /api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # =========================================================
  # DATABASE LAYER
  # =========================================================
  postgres:
    image: postgres:16-alpine
    container_name: ayantaraz-postgres
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # =========================================================
  # CACHE LAYER
  # =========================================================
  redis:
    image: redis:7-alpine
    container_name: ayantaraz-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    env_file:
      - ./.env
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

# =========================================================
# NETWORK (NO PUBLIC SERVICE EXCEPT NGINX)
# =========================================================
networks:
  internal:
    driver: bridge

# =========================================================
# PERSISTENT STORAGE
# =========================================================
volumes:
  postgres_data:
  redis_data:
