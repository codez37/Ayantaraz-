version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ayantaraz-api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
      - ./prisma:/app/prisma
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - ayantaraz-network

  db:
    image: postgres:15-alpine
    container_name: ayantaraz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ayantaraz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ayantaraz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ayantaraz} -d ${POSTGRES_DB:-ayantaraz}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ayantaraz-network

  redis:
    image: redis:7-alpine
    container_name: ayantaraz-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ayantaraz-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ayantaraz-network:
    driver: bridge
