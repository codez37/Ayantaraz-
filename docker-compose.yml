services:
  nginx:
    image: nginx:alpine
    container_name: ayantaraz-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - internal
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    container_name: ayantaraz-web
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost}
    depends_on:
      - api
    networks:
      - internal
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: ayantaraz-api
    expose:
      - "4000"
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ayantaraz-postgres
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ayantaraz-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    env_file:
      - ./.env
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data: