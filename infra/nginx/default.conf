upstream web {
    server web:3000;
    keepalive 64;
}

upstream api {
    server api:3001;
    keepalive 64;
}

log_format json_combined escape=json
'{'
  '"time":"$time_iso8601",'
  '"request_id":"$request_id",'
  '"remote_addr":"$remote_addr",'
  '"method":"$request_method",'
  '"uri":"$request_uri",'
  '"status":$status,'
  '"request_time":$request_time,'
  '"upstream_time":"$upstream_response_time",'
  '"upstream_status":"$upstream_status",'
  '"bytes_sent":$bytes_sent'
'}';

server {
    listen 80;
    server_name _;
    server_tokens off;

    client_max_body_size 50M;

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # ============================================================
    # SECURITY HEADERS (EDGE MINIMUM SAFE SET)
    # ============================================================
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-DNS-Prefetch-Control "off" always;

    # ============================================================
    # CORS (SAFE MULTI-ENV MODEL)
    # ============================================================
    set $cors "";

    if ($http_origin ~* ^https?://(localhost|127\.0\.0\.1|your-production-domain\.com)$) {
        set $cors $http_origin;
    }

    add_header Access-Control-Allow-Origin $cors always;
    add_header Access-Control-Allow-Credentials true always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Request-ID" always;
    add_header Vary Origin always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # ============================================================
    # GLOBAL PROXY HEADERS
    # ============================================================
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    # TRACE SAFETY (no spoof trust)
    set $safe_traceparent "";
    if ($http_traceparent ~ "^(00-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2})$") {
        set $safe_traceparent $http_traceparent;
    }
    proxy_set_header traceparent $safe_traceparent;
    proxy_set_header tracestate "";

    # ============================================================
    # API
    # ============================================================
    location = /api/health {
        proxy_pass http://api/health;
        add_header Cache-Control "no-store" always;
    }

    location = /api/csrf/token {
        proxy_pass http://api/csrf/token;
        add_header Cache-Control "no-store" always;
    }

    location ^~ /api/auth/ {
        proxy_pass http://api/auth/;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_read_timeout 60s;
        proxy_buffering on;
    }

    location /api/ {
        proxy_pass http://api/;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_buffering on;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    # ============================================================
    # UPLOADS (NO IMMUTABLE CACHE - CRITICAL FIX)
    # ============================================================
    location /uploads/ {
        proxy_pass http://api/uploads/;
        proxy_http_version 1.1;

        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # ============================================================
    # NEXT STATIC
    # ============================================================
    location /_next/static/ {
        proxy_pass http://web/_next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /_next/image {
        proxy_pass http://web/_next/image;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location ~* ^/(favicon|logo|robots\.txt|sitemap\.xml) {
        proxy_pass http://web;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ============================================================
    # FRONTEND
    # ============================================================
    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";

        proxy_redirect off;
        proxy_read_timeout 60s;
    }
}
