version: 2.1

orbs:
  node: circleci/node@5.2.0

jobs:
  build-and-test:
    docker:
      # استفاده از آخرین نسخه پایدار و بلندمدت Node 20 (LTS)
      - image: cimg/node:20.18.0
        environment:
          NODE_ENV: test
          DATABASE_URL: postgresql://root:password@localhost:5432/mydb?schema=public

      # دیتابیس پستگرس برای تست‌ها
      - image: cimg/postgres:15.5
        environment:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mydb

    steps:
      - checkout

      # روش استاندارد فعال‌سازی کورپک برای کاربران غیر روت (Non-root) در CircleCI
      - run:
          name: Enable Corepack and Prepare pnpm
          command: |
            corepack enable
            corepack prepare --activate

      # بازیابی کش پکیج‌ها براساس ساختار مدرن pnpm
      - restore_cache:
          keys:
            - pnpm-deps-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-deps-

      # نصب کاملاً استاندارد و ایزوله دپندنس‌ی‌ها مخصوص محیط‌های CI
      - run:
          name: Install Dependencies
          command: pnpm install --frozen-lockfile

      # ذخیره کش برای بیلدهای بعدی جهت بالا رفتن سرعت
      - save_cache:
          key: pnpm-deps-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store

      # تولید کلاینت پریسما
      - run:
          name: Generate Prisma Client
          command: pnpm prisma generate

      # بیلد نهایی و تست پروژه Next.js
      - run:
          name: Next.js Production Build
          command: pnpm build

workflows:
  build_and_test_workflow:
    jobs:
      - build-and-test
      
