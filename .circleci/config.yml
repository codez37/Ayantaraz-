version: 2.1

orbs:
  node: circleci/node@5.2.0

jobs:
  build-and-test:
    docker:
      - image: cimg/node:22.14.0   # ← نسخه جدیدتر و سازگار
        environment:
          NODE_ENV: test
          DATABASE_URL: postgresql://root:password@localhost:5432/mydb?schema=public

      - image: cimg/postgres:15.5
        environment:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mydb

    steps:
      - checkout

      # === Corepack + pnpm Setup (روش بدون خطای Permission و Engine) ===
      - run:
          name: Enable Corepack and Prepare pnpm
          command: |
            # نصب corepack در مسیر خانگی
            npm install -g corepack@latest --prefix \~/.npm-global
            
            # اضافه کردن به PATH
            export PATH="$HOME/.npm-global/bin:$PATH"
            
            # فعال‌سازی
            corepack enable --install-directory \~/.npm-global/bin
            
            # آماده‌سازی pnpm
            corepack prepare $(node -p "require('./package.json').packageManager") --activate || true
            
            echo "✅ Status:"
            node --version
            corepack --version
            pnpm --version

      # بازیابی کش
      - restore_cache:
          keys:
            - pnpm-deps-v3-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-deps-v3-

      # نصب وابستگی‌ها
      - run:
          name: Install Dependencies
          command: pnpm install --frozen-lockfile --prefer-offline

      # ذخیره کش
      - save_cache:
          key: pnpm-deps-v3-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - \~/.local/share/pnpm/store

      # Prisma
      - run:
          name: Generate Prisma Client
          command: pnpm prisma generate

      # بیلد
      - run:
          name: Next.js Production Build
          command: pnpm build

workflows:
  build_and_test_workflow:
    jobs:
      - build-and-test
