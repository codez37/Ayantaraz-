version: 2.1

orbs:
  node: circleci/node@5.2.0

jobs:
  build-and-test:
    docker:
      - image: cimg/node:22.23.0
        environment:
          NODE_ENV: test
          DATABASE_URL: postgresql://root:password@localhost:5432/mydb?schema=public

      - image: cimg/postgres:15.5
        environment:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mydb

    steps:
      - checkout

      - run:
          name: Setup Corepack and pnpm
          command: |
            # Use $HOME everywhere — never bare ~ or \~
            COREPACK_DIR="$HOME/.npm-global"
            mkdir -p "$COREPACK_DIR/bin"
            
            npm install -g corepack@latest --prefix "$COREPACK_DIR"
            export PATH="$COREPACK_DIR/bin:$PATH"
            
            corepack enable --install-directory "$COREPACK_DIR/bin"
            corepack prepare pnpm@11.9.0 --activate
            
            echo "✅ Ready:"
            node --version
            pnpm --version

      - restore_cache:
          keys:
            - pnpm-deps-v8-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-deps-v8-

      - run:
          name: Install Dependencies
          command: pnpm install --frozen-lockfile --prefer-offline

      - save_cache:
          key: pnpm-deps-v8-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store

      - run:
          name: Generate Prisma Client
          command: pnpm prisma generate

      - run:
          name: Next.js Production Build
          command: pnpm build

workflows:
  build_and_test_workflow:
    jobs:
      - build-and-test
