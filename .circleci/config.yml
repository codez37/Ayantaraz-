version: 2.1

orbs:
  node: circleci/node@5.2.0

jobs:
  build-and-test:
    docker:
      - image: cimg/node:22.23.0
        environment:
          NODE_ENV: test
          DATABASE_URL: postgresql://root:password@localhost:5432/mydb?schema=public
          # اصلاح باگ پنهان: تعریف سراسری PATH برای دسترسی pnpm در تمام مراحل
          PATH: $HOME/.npm-global/bin:$PATH

      - image: cimg/postgres:15.5
        environment:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mydb

    steps:
      - checkout

      - run:
          name: Setup Corepack and pnpm
          command: |
            # استفاده از $HOME به جای \~ برای جلوگیری از تفسیر تحت‌اللفظی
            npm install -g corepack@latest --prefix $HOME/.npm-global
            
            # فعال‌سازی corepack در مسیر مشخص‌شده‌ی مطلق
            corepack enable --install-directory $HOME/.npm-global/bin
            
            # خوانش دقیق و داینامیک نسخه‌ی packageManager از package.json
            PKG_MANAGER=$(node -p "require('./package.json').packageManager")
            corepack prepare $PKG_MANAGER --activate || true
            
            echo "✅ Environment Ready:"
            node --version
            pnpm --version

      - restore_cache:
          keys:
            - pnpm-deps-v8-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-deps-v8-

      - run:
          name: Install Dependencies
          command: pnpm install --frozen-lockfile --prefer-offline

      - save_cache:
          key: pnpm-deps-v8-{{ checksum "pnpm-lock.yaml" }}
          paths:
            # استفاده از مسیر مطلق $HOME برای تضمین پیدا شدن کش توسط CircleCI
            - $HOME/.local/share/pnpm/store

      - run:
          name: Generate Prisma Client
          command: pnpm prisma generate

      - run:
          name: Next.js Production Build
          command: pnpm build

workflows:
  build_and_test_workflow:
    jobs:
      - build-and-test
