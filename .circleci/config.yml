version: 2.1

orbs:
  node: circleci/node@5.2.0

jobs:
  build-and-test:
    docker:
      - image: cimg/node:22.13.0
        environment:
          NODE_ENV: test
          DATABASE_URL: postgresql://root:password@localhost:5432/mydb?schema=public

      - image: cimg/postgres:15.5
        environment:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mydb

    steps:
      - checkout

      # === Corepack + pnpm Setup (روش استاندارد و بدون خطای Permission) ===
      - run:
          name: Enable Corepack and Prepare pnpm
          command: |
            # نصب corepack در دایرکتوری خانگی کاربر (بدون نیاز به root)
            npm install -g corepack@latest --prefix \~/.npm-global
            
            # اضافه کردن مسیر به PATH
            export PATH="$HOME/.npm-global/bin:$PATH"
            
            # فعال‌سازی Corepack
            corepack enable --install-directory \~/.npm-global/bin
            
            # آماده‌سازی pnpm
            corepack prepare $(node -p "require('./package.json').packageManager") --activate
            
            echo "✅ Corepack & pnpm ready:"
            corepack --version
            pnpm --version
            node --version

      # بازیابی کش
      - restore_cache:
          keys:
            - pnpm-deps-v2-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-deps-v2-

      # نصب وابستگی‌ها
      - run:
          name: Install Dependencies
          command: pnpm install --frozen-lockfile --prefer-offline

      # ذخیره کش
      - save_cache:
          key: pnpm-deps-v2-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - \~/.local/share/pnpm/store

      # Prisma
      - run:
          name: Generate Prisma Client
          command: pnpm prisma generate

      # بیلد Next.js
      - run:
          name: Next.js Production Build
          command: pnpm build

workflows:
  build_and_test_workflow:
    jobs:
      - build-and-test
