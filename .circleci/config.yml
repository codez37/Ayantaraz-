version: 2.1

orbs:
  node: circleci/node@5.2.0

jobs:
  build-and-test:
    docker:
      - image: cimg/node:22.23.0   # جدیدترین نسخه Node 22
        environment:
          NODE_ENV: test
          DATABASE_URL: postgresql://root:password@localhost:5432/mydb?schema=public

      - image: cimg/postgres:15.5
        environment:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mydb

    steps:
      - checkout

      - run:
          name: Enable Corepack and Prepare pnpm
          command: |
            npm install -g corepack@latest --prefix \~/.npm-global
            export PATH="$HOME/.npm-global/bin:$PATH"
            
            corepack enable --install-directory \~/.npm-global/bin
            
            corepack prepare $(node -p "require('./package.json').packageManager") --activate || true
            
            echo "✅ Versions:"
            node --version
            corepack --version
            pnpm --version

      - restore_cache:
          keys:
            - pnpm-deps-v6-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-deps-v6-

      - run:
          name: Install Dependencies
          command: pnpm install --frozen-lockfile --prefer-offline

      - save_cache:
          key: pnpm-deps-v6-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - \~/.local/share/pnpm/store

      - run:
          name: Generate Prisma Client
          command: pnpm prisma generate

      - run:
          name: Next.js Production Build
          command: pnpm build

workflows:
  build_and_test_workflow:
    jobs:
      - build-and-test
